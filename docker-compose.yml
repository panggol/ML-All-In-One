# =============================================================================
# ML All In One - Docker Compose
# =============================================================================
# Usage:
#   docker compose up -d          # 启动所有服务
#   docker compose logs -f        # 查看日志
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlkit-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./checkpoints:/app/checkpoints
      - ./experiments:/app/experiments
      - ./uploads:/app/uploads
    working_dir: /app
    environment:
      - PYTHONPATH=/app/src:/app
      - DATABASE_URL=sqlite:///./ml_all_in_one.db
    networks:
      - mlkit-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:20-alpine
    container_name: mlkit-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      - API_PROXY_TARGET=http://api:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - mlkit-net
    depends_on:
      - api

networks:
  mlkit-net:
    driver: bridge
