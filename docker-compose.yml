# =============================================================================
# ML All In One - Docker Compose
# =============================================================================
# Usage:
#   docker compose up -d          # 启动所有服务
#   docker compose logs -f        # 查看日志
#   docker compose logs api -f    # 只看 API 日志
#   docker compose down           # 停止所有服务
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlkit-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./checkpoints:/app/checkpoints
      - ./experiments:/app/experiments
      - ./uploads:/app/uploads
    working_dir: /app
    environment:
      - PYTHONPATH=/app/src:/app
      # 修复：数据库路径改为 /app/data/，与 volumes 挂载点一致
      - DATABASE_URL=sqlite:///./data/ml_all_in_one.db
      # CORS 允许的来源列表，逗号分隔（生产环境填入实际前端地址）
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
    # cgroupns host 确保 psutil 能正确读取 cgroup v2 信息
    cgroupns: host
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 1.0
    cpus_reservation: 0.5
    # networks 写在根级（与 services 同级）
    networks:
      - mlkit-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:20-alpine
    container_name: mlkit-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      - API_PROXY_TARGET=http://api:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    # networks 写在根级（与 services 同级）
    networks:
      - mlkit-net
    depends_on:
      - api

# networks 必须写在根级，不能写在 services 内部
networks:
  mlkit-net:
    driver: bridge
