# =============================================================================
# ML All In One - Docker Compose
# =============================================================================
# Usage:
#   docker compose up -d          # Start API server
#   docker compose run --rm mlkit python examples/train_sklearn.py
#   docker compose run --rm mlkit python examples/example_auth.py
# =============================================================================

services:
  mlkit:
    build: .
    image: mlkit:latest
    container_name: mlkit
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./checkpoints:/app/checkpoints
      - ./experiments:/app/experiments
    working_dir: /app
    environment:
      - PYTHONPATH=/app/src
    networks:
      - mlkit-net

  api:
    build: .
    image: mlkit:latest
    container_name: mlkit-api
    command: uvicorn mlkit.api.inference:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./checkpoints:/app/checkpoints
      - ./experiments:/app/experiments
    working_dir: /app
    environment:
      - PYTHONPATH=/app/src
    networks:
      - mlkit-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  mlkit-net:
    driver: bridge
