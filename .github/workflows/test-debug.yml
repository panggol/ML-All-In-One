name: Test Debug

on:
  workflow_dispatch:

jobs:
  test-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Debug env
        run: |
          echo "Python: $(python --version)"
          echo "pip: $(pip --version)"
          echo "Disk: $(df -h / | tail -1)"
          echo "Memory: $(free -h | head -2)"

      - name: Install torch
        run: |
          set +e
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu 2>&1 | tee /tmp/torch-install.log
          echo "EXIT CODE: $?"
          echo "=== Last 30 lines ==="
          tail -30 /tmp/torch-install.log

      - name: Install rest
        run: |
          set +e
          pip install scikit-learn xgboost lightgbm pandas numpy scipy \
            imbalanced-learn dask polars \
            fastapi uvicorn pydantic pyyaml \
            python-multipart python-jose passlib httpx websockets \
            sqlalchemy alembic python-dotenv loguru tqdm joblib cloudpickle \
            pytest pytest-cov 2>&1 | tee /tmp/rest-install.log
          echo "EXIT CODE: $?"
          echo "=== Last 30 lines ==="
          tail -30 /tmp/rest-install.log

      - name: Verify
        run: |
          PYTHONPATH=src python -c "import mlkit; print('mlkit:', mlkit.__version__)" 2>&1

      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest tests/ -v --tb=short 2>&1 | tee /tmp/test.log
