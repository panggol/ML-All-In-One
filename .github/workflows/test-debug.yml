name: Test Debug

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  test-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Debug environment
        run: |
          echo "=== Python version ==="
          python --version
          echo "=== pip version ==="
          pip --version
          echo "=== Working directory ==="
          pwd
          echo "=== ls ==="
          ls -la
          echo "=== src/ ==="
          ls -la src/
          echo "=== tests/ ==="
          ls -la tests/

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          echo "=== Installing requirements ==="
          pip install --no-cache-dir -r requirements.txt pytest 2>&1 | tail -20
          echo "=== Verify mlkit import ==="
          PYTHONPATH=src python -c "import mlkit; print('mlkit version:', mlkit.__version__)"

      - name: Run tests with full output
        run: |
          echo "=== Running pytest ==="
          PYTHONPATH=src pytest tests/ -v --tb=long 2>&1 | tee /tmp/test-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "=== Exit code: $EXIT_CODE ==="
          echo "=== Last 50 lines of output ==="
          tail -50 /tmp/test-output.txt
          exit $EXIT_CODE
