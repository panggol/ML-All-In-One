name: Build Docker

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mlkit:test .

      - name: Verify image
        run: docker run --rm mlkit:test python -c "import mlkit; print('mlkit', mlkit.__version__)"
