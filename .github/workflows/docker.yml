name: Build Docker

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: mlkit:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: docker run --rm mlkit:test python -c "import mlkit; print('mlkit', mlkit.__version__)"
