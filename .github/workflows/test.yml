name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          # Install torch CPU-only (much smaller than default)
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          # Install remaining deps
          pip install scikit-learn xgboost lightgbm pandas numpy scipy \
            imbalanced-learn dask polars \
            fastapi uvicorn pydantic pyyaml \
            python-multipart python-jose passlib httpx websockets \
            sqlalchemy alembic python-dotenv loguru tqdm joblib cloudpickle \
            pytest pytest-cov

      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest tests/ -v --tb=short
