name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: pip install --upgrade pip pytest scikit-learn pandas numpy scipy torch --only-binary=:all:

      - name: Install mlkit
        run: pip install -e . --only-binary=:all:

      - name: Test
        run: pytest tests/ -v --tb=short
