name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install --only-binary=:all: torch torchvision
          pip install --only-binary=:all: scikit-learn xgboost lightgbm pandas numpy scipy imbalanced-learn dask polars fastapi uvicorn pydantic pyyaml python-multipart python-jose passlib httpx websockets sqlalchemy alembic python-dotenv loguru tqdm joblib cloudpickle pytest pytest-cov

      - name: Run tests
        env:
          PYTHONPATH: src
        run: |
          echo "=== PWD ==="
          pwd
          echo "=== ROOT LS ==="
          ls -la
          echo "=== SRC LS ==="
          ls -la src/ || echo "src/ NOT FOUND"
          echo "=== TESTS LS ==="
          ls -la tests/ || echo "tests/ NOT FOUND"
          echo "=== PYTHON PATH ==="
          python -c "import sys; print(sys.path)"
          echo "=== MLPATH ==="
          echo "PYTHONPATH=$PYTHONPATH"
          echo "=== COLLECT ==="
          pytest tests/ --collect-only 2>&1
          echo "=== EXIT $? ==="
